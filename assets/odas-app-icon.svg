<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hintergrund-Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#3d3fa5"/>
    </linearGradient>
    <!-- Schatten-Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Optional: Glanz-Overlay oben-links -->
  <ellipse cx="160" cy="140" rx="180" ry="160" fill="white" fill-opacity="0.07"/>

  <!-- Motiv: Telefonbuch -->
  <g filter="url(#shadow)">
    <!-- Kontaktbuch -->
    <rect x="130" y="110" width="220" height="290" rx="16" fill="none" stroke="#ffffff" stroke-width="24"/>
    <path d="M 130 180 L 350 180" stroke="#ffffff" stroke-width="24" stroke-linecap="round"/>
    <circle cx="240" cy="240" r="30" fill="#ffffff"/>
    <path d="M 180 320 Q 240 280 300 320" stroke="#ffffff" stroke-width="24" stroke-linecap="round" fill="none"/>
    <path d="M 180 360 L 300 360" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <!-- Tabs / Registerkarten an der Seite -->
    <path d="M 350 150 L 380 150 L 380 190 L 350 190" fill="#ffffff"/>
    <path d="M 350 210 L 380 210 L 380 250 L 350 250" fill="#ffffff"/>
    <path d="M 350 270 L 380 270 L 380 310 L 350 310" fill="#ffffff"/>
  </g>
</svg>